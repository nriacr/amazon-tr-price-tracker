name: Amazon TR Price Tracker
version: "1.2.12"
slug: amazon_tr_price_tracker
description: amazon.com.tr fiyatlarını izler ve Pushover bildirimi yollar.
url: https://example.com/amazon-tr-price-tracker
arch:
  - aarch64
  - armv7
  - amd64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_title: Amazon Tracker
panel_icon: mdi:bell-alert
options:
  interval_minutes: 30
  request_timeout_seconds: 20
  pushover_user_key: ""
  pushover_api_token: ""
  products: []
  search_pages: []
  search_targets: []
schema:
  interval_minutes: "int(5,1440)"
  request_timeout_seconds: "int(5,120)"
  pushover_user_key: "str"
  pushover_api_token: "str"
  products:
    - name: "str"
      url: "str"
      target_price: "float"
  search_pages:
    - name: "str"
      search_url: "str"
      search_url_2: "str?"
      max_items_to_scan: "int(1,100)?"
      notify_once_in_24H: "bool?"
  search_targets:
    - name: "str"
      search_name: "str?"
      product_name: "str"
      target_price: "float"
